<div class="al-page">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="al-card">

    <!-- Brand -->
    <div class="al-brand">
      <div class="al-logo">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="9" fill="url(#lg-admin)"/>
          <path d="M10 8v16M10 16l8-8M10 16l8 8" stroke="#fff" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="lg-admin" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0a6b63"/><stop offset="1" stop-color="#0d9488"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="al-brand-name">klock <span class="al-badge">Team</span></span>
    </div>

    <h1 class="al-heading">Klocky Admin</h1>
    <p class="al-subtext">Internal access only — Klocky team members</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate autocomplete="off">

      <!-- Email -->
      <div class="al-field">
        <label class="al-label" for="al-email">Email</label>
        <div class="al-input-wrap" [class.al-error]="isInvalid('email')">
          <svg class="al-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input id="al-email" class="al-input" type="email" autocomplete="email"
                 placeholder="team@klocky.app" formControlName="email" />
        </div>
        @if (isInvalid('email')) { <p class="al-error-msg">Enter a valid email.</p> }
      </div>

      <!-- Password -->
      <div class="al-field">
        <label class="al-label" for="al-password">Password</label>
        <div class="al-input-wrap" [class.al-error]="isInvalid('password')">
          <svg class="al-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="al-password" class="al-input" type="password"
                 placeholder="••••••••" formControlName="password" />
        </div>
        @if (isInvalid('password')) { <p class="al-error-msg">Password is required.</p> }
      </div>

      @if (loginError()) {
        <div class="al-login-error">{{ loginError() }}</div>
      }

      <button class="al-btn" type="submit" [disabled]="submitting()">
        @if (submitting()) {
          <span class="al-spinner"></span> Signing in…
        } @else {
          Sign in to Admin Panel
        }
      </button>

    </form>

    <div class="al-back">
      <a routerLink="/" class="al-back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to home
      </a>
    </div>

  </div>
</div>
