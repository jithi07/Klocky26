<div class="lk-step">

  <div class="lk-top-bar">
    <button type="button" class="lk-back-btn" (click)="back.emit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </button>

    <div class="lk-org-context">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      {{ state.orgDisplayName() }}
    </div>
  </div>

  <h1 class="lk-heading">
    Sign in to<br>
    <span class="lk-heading-accent">{{ state.orgDisplayName() }}.</span>
  </h1>
  <p class="lk-subtext">
    Enter your work email and we'll send you a one-time code.
  </p>

  <div class="lk-field">
    <label class="lk-label" for="email-input">Work email</label>
    <div class="lk-input-wrap" [class.lk-input-error]="error">
      <svg class="lk-input-icon" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <input
        id="email-input"
        class="lk-input"
        type="email"
        autocomplete="email"
        placeholder="you@{{ state.orgIdentifier() }}.com"
        [(ngModel)]="emailInput"
        (keydown.enter)="requestOtp()"
      />
    </div>
    @if (error) {
      <p class="lk-error-msg">{{ error }}</p>
    }
  </div>

  <button
    class="lk-btn"
    type="button"
    [disabled]="!emailInput.trim() || loading"
    (click)="requestOtp()"
  >
    @if (loading) {
      <span class="lk-spinner"></span>
      Sending code…
    } @else {
      Continue
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    }
  </button>

  <p class="lk-legal">
    By continuing, you agree to Klocky's
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

</div>
